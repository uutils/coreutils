name: Benchmarks

# spell-checker:ignore codspeed dtolnay Swatinem sccache memtrack moonrepo

on:
  pull_request:
  push:
    branches:
      - '*'

permissions:
  contents: read # to fetch code (actions/checkout)

# End the current execution if there is a new changeset in the PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  benchmarks:
    name: Run ${{ matrix.type }} benchmarks for ${{ matrix.package }} (CodSpeed)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        type: [performance, memory]
        package: [
          uu_base64,
          uu_cksum,
          uu_cp,
          uu_cut,
          uu_dd,
          uu_df,
          uu_du,
          uu_expand,
          uu_fold,
          uu_join,
          uu_ls,
          uu_mv,
          uu_nl,
          uu_numfmt,
          uu_rm,
          uu_seq,
          uu_shuf,
          uu_sort,
          uu_split,
          uu_timeout,
          uu_tsort,
          uu_unexpand,
          uu_uniq,
          uu_wc,
          uu_factor,
          uu_date
        ]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Prefer CodSpeed's recommended setup to keep toolchain/binary versions aligned
      # with the CodSpeed action (helps avoid memtrack/cargo-codspeed incompatibilities).
      - name: Setup Rust (with cargo-codspeed)
        uses: moonrepo/setup-rust@v1
        with:
          rust-version:　1.85.0
          cache: true
          cache-target: true
          bins: cargo-codspeed  

      - name: Build benchmarks for ${{ matrix.package }} (${{ matrix.type }})
        shell: bash
        run: |
          echo "Building ${{ matrix.type }} benchmarks for ${{ matrix.package }}"
          if [ "${{ matrix.type }}" = "memory" ]; then
            cargo codspeed build -m analysis -p ${{ matrix.package }}
          else
            cargo codspeed build -p ${{ matrix.package }}
          fi

      - name: Run ${{ matrix.type }} benchmarks for ${{ matrix.package }}
        uses: CodSpeedHQ/action@v4
        env:
          CODSPEED_LOG: debug
          RUST_BACKTRACE: full
        with:
          mode: ${{ matrix.type == 'memory' && 'memory' || 'simulation' }}
          run: |
            echo "Running ${{ matrix.type }} benchmarks for ${{ matrix.package }}"
            cargo codspeed run -p ${{ matrix.package }} > /dev/null
          token: ${{ secrets.CODSPEED_TOKEN }}
