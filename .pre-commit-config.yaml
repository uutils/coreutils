# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
exclude: ^tests/fixtures/
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-json
        exclude: '\.vscode/(cSpell|extensions)\.json' # cSpell.json and extensions.json use comments
      - id: check-shebang-scripts-are-executable
        exclude: '.+\.rs' # would be triggered by #![some_attribute]
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
        args: [ --allow-multiple-documents ]
      - id: destroyed-symlinks
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [ --fix=lf ]
      - id: trailing-whitespace

  - repo: https://github.com/mozilla-l10n/moz-fluent-linter
    rev: v0.4.9
    hooks:
      - id: fluent_linter
        files: \.ftl$
        args: [--config, .github/fluent_linter_config.yml, src/uu/]

  - repo: local
    hooks:
      - id: rust-linting
        name: Rust linting
        description: Run cargo fmt on files included in the commit.
        entry: cargo +stable fmt --
        pass_filenames: true
        types: [file, rust]
        language: system
      - id: rust-clippy
        name: Rust clippy
        description: Run cargo clippy on files included in the commit.
        entry: cargo +stable clippy --workspace --all-targets --all-features -- -D warnings
        pass_filenames: false
        types: [file, rust]
        language: system
      - id: cargo-lock-check
        name: Cargo.lock sync check
        description: Ensure Cargo.lock and fuzz/Cargo.lock are up-to-date.
        entry: bash -c 'for dir in . fuzz; do ( cd "$dir" && cargo fetch --quiet ); done'
        pass_filenames: false
        files: 'Cargo\.(toml|lock)$'
        language: system
      - id: cspell
        name: Code spell checker (cspell)
        description: Run the same pinned cspell scan as CI.
        entry: cspell --no-summary --no-progress .
        pass_filenames: false
        language: node
        additional_dependencies: [cspell@10.0.1]
      - id: ruff-check
        name: Ruff lint
        description: Run the same pinned Ruff lint as CI.
        entry: ruff check ./util
        pass_filenames: false
        language: python
        additional_dependencies: [ruff==0.15.22]
      - id: ruff-format
        name: Ruff format
        description: Run the same pinned Ruff format check as CI.
        entry: ruff format --check ./util
        pass_filenames: false
        language: python
        additional_dependencies: [ruff==0.15.22]

ci:
  skip: [rust-linting, rust-clippy, cargo-lock-check]
