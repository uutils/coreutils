[package]
name = "uu_chcon"
description = "chcon ~ (uutils) change file security context"
repository = "https://github.com/uutils/coreutils/tree/main/src/uu/chcon"
keywords = ["coreutils", "uutils", "cli", "utility"]
version.workspace = true
license.workspace = true
homepage.workspace = true
categories.workspace = true
edition.workspace = true
rust-version.workspace = true
readme.workspace = true

[lints]
workspace = true

[lib]
path = "src/chcon.rs"
test = false
doctest = false

[target.'cfg(any(target_os = "linux", target_os = "android"))'.dependencies]
clap = { workspace = true, optional = true }
fluent = { workspace = true, optional = true }
fts-sys = { workspace = true, optional = true }
libc = { workspace = true, optional = true }
selinux = { workspace = true, optional = true }
thiserror = { workspace = true, optional = true }
uucore = { workspace = true, features = [
  "entries",
  "fs",
  "perms",
  "selinux",
], optional = true }

[features]
selinux = [
  "dep:clap",
  "dep:fluent",
  "dep:fts-sys",
  "dep:libc",
  "dep:selinux",
  "dep:thiserror",
  "dep:uucore",
]

[[bin]]
name = "chcon"
path = "src/main.rs"
required-features = ["uucore/selinux"]
